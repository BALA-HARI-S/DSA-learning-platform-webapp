<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlgoArcade — Play your way through DSA</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="bg-grid" aria-hidden="true"></div>

  <header class="topbar">
    <div class="brand" id="brand">
      <span class="logo">◆</span>
      <span class="brand-name">Algo<span class="accent">Arcade</span></span>
    </div>
    <div class="hud">
      <div class="hud-level" id="hud-level" title="Your level">LV 1</div>
      <div class="xp">
        <div class="xp-bar"><div class="xp-fill" id="xp-fill"></div></div>
        <div class="xp-text" id="xp-text">0 / 100 XP</div>
      </div>
      <button class="btn ghost small" id="btn-badges" title="Badges">🏅 <span id="badge-count">0</span></button>
      <button class="btn ghost small" id="btn-reset" title="Reset all progress">⟲</button>
    </div>
  </header>

  <main id="view" class="view"><!-- rendered by JS --></main>

  <div id="toast" class="toast" aria-live="polite"></div>

  <!-- modal overlay (badges, level-up, etc.) -->
  <div id="overlay" class="overlay hidden">
    <div class="overlay-card" id="overlay-card"></div>
  </div>

  <footer class="footnote">
    Built for the DSA course in this repo · progress saved locally in your browser ·
    <span class="muted">no account, no internet needed</span>
  </footer>

  <!-- load order matters (classic scripts share global scope) -->
  <script src="js/util.js"></script>
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/games.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
